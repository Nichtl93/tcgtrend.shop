name: Build Windows RC

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Windows-App bauen
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm TCGImageProcessor.spec

      - name: Portable ZIP erstellen
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "dist\TCG Image Processor\*" `
            -DestinationPath "TCG-Image-Processor-1.0.0-rc1-Portable.zip" `
            -Force

      - name: Portable Build hochladen
        uses: actions/upload-artifact@v4
        with:
          name: TCG-Image-Processor-1.0.0-rc1-Windows
          path: TCG-Image-Processor-1.0.0-rc1-Portable.zip

